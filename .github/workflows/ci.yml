name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality Gates ────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter pi-acp-types run build
      - run: pnpm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:ci

  # ── Pack Verification ────────────────────────────────────────
  pack:
    name: Verify Package
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check package contents
        run: |
          echo "📦 Package tarball contents:"
          npm pack --dry-run 2>&1 | tee pack-output.txt
          echo ""
          echo "🔍 Verifying no test/dev files leaked..."
          ! grep -E '(test/|\.test\.|vitest|tsconfig|\.github)' pack-output.txt || (echo "❌ Dev files found in package!" && exit 1)
          echo "✅ Package clean"
      - name: Verify pi fields
        run: |
          node -e "
            const pkg = require('./package.json');
            assert(pkg.pi, 'Missing pi field');
            assert(pkg.pi.extensions, 'Missing pi.extensions');
            assert(pkg.pi.skills, 'Missing pi.skills');
            assert(pkg.files.length >= 5, 'Files whitelist too small');
            assert(pkg.keywords.includes('pi-package'), 'Missing pi-package keyword');
            console.log('✅ pi fields valid');
          "
      - name: Check package size
        run: |
          SIZE=$(npm pack --dry-run 2>&1 | grep "package size" | grep -oP '[\d.]+ kB')
          echo "📦 Package size: ${SIZE}"
          # Fail if > 200 kB (TS source packages are ~115 kB legitimately)
          echo "$SIZE" | awk '{if ($1 > 200) exit 1}'

  # ── Publish ──────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: [lint, test, pack]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      - name: Determine npm tag
        id: tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" == *"-"* ]]; then
            TAG="next"
          elif [[ "$VERSION" == *"rc"* ]]; then
            TAG="rc"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Publishing v${VERSION} as @${TAG}"

      - name: Verify version consistency
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "❌ Version mismatch: package.json=${PKG_VER}, tag=${TAG_VER}"
            exit 1
          fi
          echo "✅ Version consistent: ${PKG_VER}"

      - run: pnpm publish --provenance --access public --tag ${{ steps.tag.outputs.tag }} --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Published ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | pi-acp-agents |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.tag.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${{ steps.tag.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provenance | ✅ Signed |" >> "$GITHUB_STEP_SUMMARY"

  # ── Release Notes ────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV" ]; then
            NOTES="Initial release"
          else
            NOTES=$(git log ${PREV}..HEAD --pretty=format:"- %s" | head -30)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
